name: Docker Build and Push

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PAT }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          # MUDANÇA AQUI: Como o repo é o Core, o contexto é a raiz (.)
          context: . 
          push: true
          # Garanta que a tag está em letras minúsculas (padrão do Docker)
          tags: ghcr.io/${{ github.actor }}/kombi-telemetry-analytics:latest